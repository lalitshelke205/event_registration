<!DOCTYPE html>
<html>
<head>
    <title>View Registrations</title>
</head>
<body>
    <h2>Registered Participants</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Event</th>
            <th>Action</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td><a href="/delete/{{ row[0] }}">Delete</a></td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back to Registration</a>
</body>
</html>
